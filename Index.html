<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Together</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <header class="bg-gray-900 text-white p-4 flex justify-between items-center">
        <div class="font-bold tracking-wider text-sm">✈️ EXPLORE TOGETHER</div>
        <nav class="space-x-4 text-xs font-medium">
            <a href="#" class="text-gray-400 hover:text-white">START A TRIP</a>
            <a href="#" class="text-white border-b border-white pb-1">FIND A TRIP</a>
        </nav>
    </header>

    <main class="max-w-6xl mx-auto p-6">
        
        <section class="mb-8">
            <h1 class="text-2xl font-bold mb-4">Find a trip</h1>
            <div class="bg-white p-4 rounded-xl shadow-sm grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div>
                    <label class="text-xs text-gray-400 font-bold block mb-1">WHERE TO GO</label>
                    <input type="text" value="Finland" class="w-full bg-gray-50 p-2 rounded text-sm border focus:outline-none">
                </div>
                <div>
                    <label class="text-xs text-gray-400 font-bold block mb-1">DATES</label>
                    <div class="p-2 bg-gray-50 rounded text-sm border text-gray-600">Jul 10 - Aug 15</div>
                </div>
                <div>
                    <label class="text-xs text-gray-400 font-bold block mb-1">TRAVELERS</label>
                    <div class="p-2 bg-gray-50 rounded text-sm border text-gray-600">2 travelers</div>
                </div>
                <button class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded text-sm font-medium transition">
                    Search
                </button>
            </div>
        </section>

        <section>
            <h2 class="text-xl font-bold mb-4 text-gray-700">Results</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                
                <div class="bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-md transition">
                    <img src="https://images.unsplash.com/photo-1517411032315-54ef2cb783bb?w=400&q=80" alt="Helsinki" class="w-full h-48 object-cover">
                    <div class="p-4 flex justify-between items-center">
                        <div>
                            <h3 class="font-bold text-sm">Helsinki trip</h3>
                            <p class="text-xs text-gray-400">Helsinki, Finland</p>
                        </div>
                        <span class="font-bold text-gray-900">355€</span>
                    </div>
                </div>

                <div class="bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-md transition">
                    <img src="https://images.unsplash.com/photo-1548685913-fe6574340a49?w=400&q=80" alt="Porvoo" class="w-full h-48 object-cover">
                    <div class="p-4 flex justify-between items-center">
                        <div>
                            <h3 class="font-bold text-sm">Old town</h3>
                            <p class="text-xs text-gray-400">Porvoo, Finland</p>
                        </div>
                        <span class="font-bold text-gray-900">310€</span>
                    </div>
                </div>

                <div class="bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-md transition">
                    <img src="https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?w=400&q=80" alt="Camping" class="w-full h-48 object-cover">
                    <div class="p-4 flex justify-between items-center">
                        <div>
                            <h3 class="font-bold text-sm">Camping tour</h3>
                            <p class="text-xs text-gray-400">Nuuksio National Park</p>
                        </div>
                        <span class="font-bold text-gray-900">685€</span>
                    </div>
                </div>

            </div>
        </section>

    </main>

</body>
</html>
