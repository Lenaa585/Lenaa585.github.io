<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planifica tu Ruta - Explore Together</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* ESTILOS PERSONALIZADOS: Ocultan la flecha por defecto de la etiqueta <details> */
        details > summary::-webkit-details-marker { display: none; }
        details > summary { list-style: none; }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col justify-between">

    <header class="bg-gray-900 text-white p-4 shadow-md">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="font-bold tracking-wider text-sm">✈️ EXPLORE TOGETHER</div>
            
            <nav class="space-x-6 text-sm font-medium">
                <a href="index.html" class="text-gray-300 hover:text-white transition">Inicio</a>
                <a href="Organize.html" class="text-blue-400 border-b-2 border-blue-400 pb-1">Organizar Viaje</a>
            </nav>
        </div>
    </header>

    <main class="max-w-5xl w-full mx-auto p-6 my-auto">
        
        <div class="mb-6 text-center md:text-left">
            <h2 class="text-3xl font-bold text-gray-900 mb-1">Planifica tu próximo viaje</h2>
            <p class="text-sm text-gray-500">Introduce tus preferencias para empezar a buscar las mejores combinaciones.</p>
        </div>

        <form class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 grid grid-cols-1 md:grid-cols-4 gap-4 items-center">
            
            <div class="border-b md:border-b-0 md:border-r border-gray-100 pb-3 md:pb-0 md:pr-4 relative">
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">
                    📍 ¿Desde dónde sales?
                </label>
                <input 
                    id="origin-input"
                    type="text" 
                    autocomplete="off"
                    class="w-full bg-transparent text-sm font-semibold text-gray-800 focus:outline-none placeholder-gray-300"
                    placeholder="Ciudad de origen"
                >
                <div id="origin-suggestions" class="absolute left-0 right-0 mt-3 bg-white border border-gray-100 rounded-xl shadow-xl z-50 max-h-48 overflow-y-auto hidden"></div>
            </div>

            <div class="border-b md:border-b-0 md:border-r border-gray-100 pb-3 md:pb-0 md:px-4 relative">
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">
                    🎯 ¿A dónde quieres ir?
                </label>
                <input 
                    id="destination-input"
                    type="text" 
                    autocomplete="off"
                    class="w-full bg-transparent text-sm font-semibold text-gray-800 focus:outline-none placeholder-gray-300"
                    placeholder="Ciudad de destino"
                >
                <div id="destination-suggestions" class="absolute left-0 right-0 mt-3 bg-white border border-gray-100 rounded-xl shadow-xl z-50 max-h-48 overflow-y-auto hidden"></div>
            </div>

            <div class="border-b md:border-b-0 md:border-r border-gray-100 pb-3 md:pb-0 md:px-4 relative">
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">
                    🚊 Transportes
                </label>
                
                <details class="relative">
                    <summary class="flex items-center justify-between text-sm font-semibold text-gray-700 cursor-pointer select-none py-0.5">
                        <span>Configurar...</span>
                        <span class="text-gray-400 text-xs">▼</span>
                    </summary>
                    
                    <div class="absolute left-0 md:-left-4 mt-3 w-56 bg-white border border-gray-100 rounded-xl shadow-xl p-4 z-50 space-y-3">
                        <p class="text-[11px] font-bold text-gray-400 uppercase tracking-wider border-b pb-1">¿Qué quieres usar?</p>
                        
                        <label class="flex items-center space-x-3 cursor-pointer text-sm font-medium text-gray-700 hover:text-blue-600">
                            <input type="checkbox" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500" checked>
                            <span>✈️ Avión</span>
                        </label>

                        <label class="flex items-center space-x-3 cursor-pointer text-sm font-medium text-gray-700 hover:text-blue-600">
                            <input type="checkbox" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500" checked>
                            <span>🚊 Tren</span>
                        </label>

                        <label class="flex items-center space-x-3 cursor-pointer text-sm font-medium text-gray-700 hover:text-blue-600">
                            <input type="checkbox" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                            <span>🚌 Autobús</span>
                        </label>

                    </div>
                </details>
            </div>

            <div class="md:pl-4">
                <button 
                    type="button" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-xl text-sm transition shadow-md shadow-blue-100"
                >
                    Buscar opciones
                </button>
            </div>

        </form>

    </main>

    <footer class="text-center p-4 text-xs text-gray-400 bg-white border-t border-gray-100">
        &copy; 2026 Explore Together. Diseñado para GitHub Pages.
    </footer>

    <script>
        // 1. Array de datos: Ciudades indexadas para la búsqueda inteligente
        const cities = [
            "Bilbao, España",
            "Barcelona, España",
            "Berlin, Alemania",
            "Helsinki, Finlandia",
            "Londres, Reino Unido",
            "Madrid, España",
            "París, Francia",
            "Porvoo, Finlandia",
            "Roma, Italia"
        ];

        // 2. Función reutilizable para activar el autocompletado en los inputs
        function enableAutocomplete(inputId, suggestionsId) {
            const input = document.getElementById(inputId); // Captura el cuadro de texto
            const box = document.getElementById(suggestionsId); // Captura la caja de sugerencias

            // Escucha en tiempo real todo lo que el usuario escribe o borra
            input.addEventListener('input', function() {
                const text = input.value.toLowerCase().trim();
                box.innerHTML = ''; // Resetea las sugerencias previas del contenedor

                // Si la casilla está en blanco, oculta la cajita flotante y detiene el proceso
                if (!text) {
                    box.classList.add('hidden');
                    return;
                }

                // Filtra el array 'cities' guardando solo los nombres que incluyan las letras escritas
                const matches = cities.filter(city => city.toLowerCase().includes(text));

                // Si no hay ninguna coincidencia, mantiene la caja oculta
                if (matches.length === 0) {
                    box.classList.add('hidden');
                    return;
                }

                // Si hay elementos válidos, elimina 'hidden' para hacer visible el recuadro
                box.classList.remove('hidden');

                // Crea dinámicamente un elemento HTML <div> por cada ciudad que coincida
                matches.forEach(city => {
                    const option = document.createElement('div');
                    // Estilos de la fila sugerida (padding, cambio de color al pasar el ratón, bordes internos)
                    option.className = 'p-3 hover:bg-gray-50 cursor-pointer text-sm text-gray-700 transition border-b border-gray-50 last:border-none';
                    option.textContent = city;

                    // Si el usuario hace clic sobre la sugerencia generada
                    option.addEventListener('click', function() {
                        input.value = city; // Coloca el texto de la ciudad en el input
                        box.classList.add('hidden'); // Oculta inmediatamente el menú
                    });

                    box.appendChild(option); // Añade el nuevo botón de opción al contenedor principal
                });
            });

            // Evento global: Si se hace un clic fuera de la casilla o de sus sugerencias, estas se esconden automáticamente
            document.addEventListener('click', function(e) {
                if (!input.contains(e.target) && !box.contains(e.target)) {
                    box.classList.add('hidden');
                }
            });
        }

        // 3. Inicialización del motor de búsqueda asignándolo a las dos casillas mediante sus identificadores únicos (IDs)
        enableAutocomplete('origin-input', 'origin-suggestions');
        enableAutocomplete('destination-input', 'destination-suggestions');
    </script>

</body>
</html>
