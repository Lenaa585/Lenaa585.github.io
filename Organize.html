// 2. Función de autocompletado mejorada
function enableAutocomplete(inputId, suggestionsId) {
    const input = document.getElementById(inputId);
    const box = document.getElementById(suggestionsId);
    // Capturamos el selector de continente
    const continentSelect = document.getElementById('continent-select');

    input.addEventListener('input', function() {
        const text = input.value.toLowerCase().trim();
        const selectedContinent = continentSelect.value; // Leemos qué continente está seleccionado
        box.innerHTML = '';

        if (!text) {
            box.classList.add('hidden');
            return;
        }

        // Magia del filtro: Comprueba la letra escrita Y ADEMÁS comprueba el continente
        const matches = cities.filter(cityObj => {
            const matchesText = cityObj.name.toLowerCase().includes(text);
            // Si está en "Todos", ignora el filtro de continente. Si no, debe coincidir.
            const matchesContinent = (selectedContinent === "Todos") || (cityObj.continent === selectedContinent);
            
            return matchesText && matchesContinent;
        });

        if (matches.length === 0) {
            box.classList.add('hidden');
            return;
        }

        box.classList.remove('hidden');

        // Ahora iteramos sobre los objetos encontrados
        matches.forEach(cityObj => {
            const option = document.createElement('div');
            // Añadimos una etiqueta visual para saber de qué continente es la sugerencia
            option.innerHTML = `
                <span class="font-semibold">${cityObj.name}</span> 
                <span class="text-[10px] text-gray-400 ml-2 bg-gray-100 px-2 py-0.5 rounded">${cityObj.continent}</span>
            `;
            option.className = 'p-3 hover:bg-gray-50 cursor-pointer text-sm text-gray-700 transition border-b border-gray-50 last:border-none flex items-center justify-between';

            option.addEventListener('click', function() {
                input.value = cityObj.name; // Escribimos solo el nombre en la casilla
                box.classList.add('hidden');
            });

            box.appendChild(option);
        });
    });

    document.addEventListener('click', function(e) {
        if (!input.contains(e.target) && !box.contains(e.target)) {
            box.classList.add('hidden');
        }
    });
}

// 3. Inicializamos
